# GECKO VPP — local + production-symmetric docker compose
# Local dev:   docker compose up -d
# Production:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Per Hetzner pattern (see /opt/zhytomyr/docker-compose.yml):
#   - postgres lives on internal network only
#   - api joins both gecko-internal and caddy_web (so Caddy can reach it)
#   - container names are addressable via Docker DNS (e.g. gecko-api:8000)

services:

  postgres:
    image: postgres:16-alpine
    container_name: gecko-postgres
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gecko_vpp}
      POSTGRES_USER: ${POSTGRES_USER:-gecko}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5433:5432"        # bound to localhost only; dev convenience
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gecko} -d ${POSTGRES_DB:-gecko_vpp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gecko-internal

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: gecko-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gecko}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gecko_vpp}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      TENANT_PRODUCER_UUID: ${TENANT_PRODUCER_UUID}
      TENANT_CI_UUID: ${TENANT_CI_UUID}
      TENANT_STORAGE_UUID: ${TENANT_STORAGE_UUID}
      VOICE_PROVIDER: ${VOICE_PROVIDER:-stub}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "127.0.0.1:8000:8000"        # local dev only; in prod we route via caddy_web network
    networks:
      - gecko-internal

volumes:
  pgdata:
    name: gecko_pgdata

networks:
  gecko-internal:
    name: gecko-internal
    driver: bridge
